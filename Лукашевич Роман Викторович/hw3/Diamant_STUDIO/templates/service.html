{% extends "base.html" %}

{% block title %}
Услуги
{% endblock %}

{% block content %}
<h1>Наши услуги</h1>

<ul>
    {% for service in services %}
        <li>
            {{ service.name }} —
            {{ service.price }} BYN —
            {{ service.duration }}
        </li>
    {% empty %}
        <li>Услуги отсутствуют.</li>
    {% endfor %}
</ul>
{% endblock %}
